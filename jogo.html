<body>

<script>
let usuarioLogado = localStorage.getItem("usuario");
let valorAposta = 10;
let dificuldadeRTP = 0.95;
let jogoAtivo = false;
let apostando = false;
let _saldoServidor = 0;
let _ultimaApostaTimestamp = 0;
let bolaMovida = false;
let velocidadeBranca = { x: 0, y: 0 };
let velocidadeDourada = { x: 0, y: 0 };
let atrito = 1;
let gameLoopRunning = false;

let tempoJogo = 0;
let tempoMaximo = 2.5;
let timerAtivo = false;

const CANVAS_BORDER_WIDTH = 6; // canvas CSS border (px), used to sync SVG overlay coordinates

/* ===== DESBLOQUEIO DE ÁUDIO NO PRIMEIRO GESTO ===== */
let _musicStarted = false;

function _startMusicOnGesture() {
    if (_musicStarted) return;
    _musicStarted = true;

    // Criar AudioContext no gesto do usuário (obrigatório em mobile)
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.log("Audio não suportado"); return; }
    }

    // Resume é assíncrono — esperar COMPLETAR antes de tocar
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(function() {
            playBackgroundMusic();
        }).catch(function(err) {
            console.warn('Audio resume failed:', err);
        });
    } else {
        playBackgroundMusic();
    }
}

// Usar captura (3o argumento true) para pegar o evento ANTES do touch-action: none cancelar
['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(evt) {
    document.addEventListener(evt, _startMusicOnGesture, { once: true, capture: true, passive: true });
});
/* ===== FIM DESBLOQUEIO ===== */

/* ===== SISTEMA DE ÁUDIO =====*/
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.log("Audio não suportado"); return; }
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(function(err) { console.warn('Audio resume failed:', err); });
    }
}

function playHitSound(velocidade) {
    if (!audioCtx) return;
    const vol = Math.min(Math.max(Math.abs(velocidade) / 8, 0.3), 1.0) * 0.7;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.08);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(3500, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

let _lastWallSound = 0;
function playWallSound() {
    const now = Date.now();
    if (now - _lastWallSound < 50) return;
    _lastWallSound = now;
    if (!audioCtx) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.05);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(300, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.05);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

function playPocketSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.35);
}

function playWinSound() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.6, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.25);
    });
}

function playLoseSound() {
    if (!audioCtx) return;
    const notes = [329.63, 261.63]; // E4, C4
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + 0.15);
    });
}

function playBetSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = 800;
    osc2.type = "sine";
    osc2.frequency.value = 1600;
    gain.gain.setValueAtTime(0.45, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc2.start();
    osc.stop(audioCtx.currentTime + 0.3);
    osc2.stop(audioCtx.currentTime + 0.3);
}

function playAimSound() {
    if (!audioCtx) return;
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.02);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

/* ===== MÚSICA DE FUNDO AMBIENTE ===== */
let bgMusicPlaying = false;
let bgMusicNodes = [];
let bgMusicTimeout = null;

function playBackgroundMusic() {
    if (bgMusicPlaying || !audioCtx) return;
    bgMusicPlaying = true;

    // Master gain para toda a música de fundo
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.15; // Volume baixo para não atrapalhar efeitos
    masterGain.connect(audioCtx.destination);
    bgMusicNodes.push(masterGain);

    // === PAD ATMOSFÉRICO (acorde menor) ===
    // Notas: C3, Eb3, G3, Bb3 — acorde Cm7 suave
    const padFreqs = [130.81, 155.56, 196.00, 233.08];
    padFreqs.forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.06;

        // Tremolo sutil para sensação "viva"
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.type = 'sine';
        lfo.frequency.value = 0.3 + Math.random() * 0.2; // 0.3-0.5 Hz
        lfoGain.gain.value = 0.015; // Variação muito sutil
        lfo.connect(lfoGain);
        lfoGain.connect(gain.gain);
        lfo.start();

        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        bgMusicNodes.push(osc, gain, lfo, lfoGain);
    });

    // === BAIXO PULSANTE (dopamina/urgência) ===
    // Nota grave C2 pulsando ritmicamente
    const bassOsc = audioCtx.createOscillator();
    bassOsc.type = 'sine';
    bassOsc.frequency.value = 65.41; // C2

    const bassGain = audioCtx.createGain();
    bassGain.gain.value = 0;

    // LFO para pulsar o baixo (batida cardíaca artificial)
    const bassLfo = audioCtx.createOscillator();
    const bassLfoGain = audioCtx.createGain();
    bassLfo.type = 'sine';
    bassLfo.frequency.value = 0.667; // ~80 BPM (batimento cardíaco)
    bassLfoGain.gain.value = 0.05;
    bassLfo.connect(bassLfoGain);
    bassLfoGain.connect(bassGain.gain);
    bassLfo.start();

    bassOsc.connect(bassGain);
    bassGain.connect(masterGain);
    bassOsc.start();
    bgMusicNodes.push(bassOsc, bassGain, bassLfo, bassLfoGain);

    // === NOTAS MELÓDICAS ALEATÓRIAS (pentatônica menor) ===
    // C, Eb, F, G, Bb em diferentes oitavas — estilo jazz lounge
    const pentatonic = [261.63, 311.13, 349.23, 392.00, 466.16, 523.25, 622.25, 698.46];

    function playRandomNote() {
        if (!bgMusicPlaying || !audioCtx) return;

        const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
        const osc = audioCtx.createOscillator();
        osc.type = Math.random() > 0.5 ? 'sine' : 'triangle';
        osc.frequency.value = freq;

        const noteGain = audioCtx.createGain();
        const now = audioCtx.currentTime;
        const duration = 1.5 + Math.random() * 2; // 1.5-3.5 segundos

        noteGain.gain.setValueAtTime(0, now);
        noteGain.gain.linearRampToValueAtTime(0.04, now + 0.1); // Fade in suave
        noteGain.gain.exponentialRampToValueAtTime(0.001, now + duration); // Fade out longo

        osc.connect(noteGain);
        noteGain.connect(masterGain);
        osc.start(now);
        osc.stop(now + duration);
        bgMusicNodes.push(osc, noteGain);

        // Próxima nota aleatória entre 2-5 segundos
        const nextDelay = 2000 + Math.random() * 3000;
        bgMusicTimeout = setTimeout(playRandomNote, nextDelay);
    }

    // Iniciar notas melódicas após 2 segundos
    bgMusicTimeout = setTimeout(playRandomNote, 2000);
}

function stopBackgroundMusic() {
    bgMusicPlaying = false;
    if (bgMusicTimeout !== null) { clearTimeout(bgMusicTimeout); bgMusicTimeout = null; }
    bgMusicNodes.forEach(node => {
        try {
            if (node.stop) node.stop();
            node.disconnect();
        } catch(e) {}
    });
    bgMusicNodes = [];
}

// Variáveis para o estilingue
let touchStartX = 0;
let touchStartY = 0;
let isTouching = false;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const slingshot = document.getElementById("slingshot");
const aimLine = document.getElementById("aim-line");

canvas.width = window.innerWidth * 0.94;
canvas.height = canvas.width * 0.80;

// Pre-render felt texture pattern once for performance (single path for efficiency)
const feltOffscreen = document.createElement("canvas");
feltOffscreen.width = canvas.width;
feltOffscreen.height = canvas.height;
const feltCtx = feltOffscreen.getContext("2d");
feltCtx.globalAlpha = 0.03;
feltCtx.strokeStyle = "#000000";
feltCtx.lineWidth = 1;
feltCtx.beginPath();
for (let y = 0; y < canvas.height; y += 3) {
    feltCtx.moveTo(0, y);
    feltCtx.lineTo(canvas.width, y);
}
feltCtx.stroke();

// Pre-compute vignette gradient (canvas size is fixed after init)
const vignetteGradient = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.height * 0.3,
    canvas.width / 2, canvas.height / 2, canvas.height * 0.8
);
vignetteGradient.addColorStop(0, "rgba(0,0,0,0)");
vignetteGradient.addColorStop(1, "rgba(0,0,0,0.35)");

let branca = { x: 0, y: 0, r: 8 }, 
    dourada = { x: 0, y: 0, r: 8 }, 
    hole = { x: 0, y: 0, r: 10 };

/* ===== INICIALIZAR POSIÇÕES =====*/
function sortearPosicoes() {
    const m = 2; 
    const cantos = [
        {x: m, y: m}, 
        {x: canvas.width - m, y: m}, 
        {x: m, y: canvas.height - m}, 
        {x: canvas.width - m, y: canvas.height - m}
    ];
    hole = cantos[Math.floor(Math.random() * 4)];
    hole.r = 16;

    const centroX = canvas.width / 2;
    const centroY = canvas.height / 2;

    if (window.resultadoFinal === false) {
        // PERDEU: posicionar bolas com ângulo difícil
        const offsetBase = 50 + Math.random() * 30; // 50-80px
        const lado = Math.random() > 0.5 ? 1 : -1;
        
        dourada.x = (hole.x < centroX) ? centroX + 40 : centroX - 40;
        dourada.y = (hole.y < centroY) ? centroY + 40 : centroY - 40;
        
        // Deslocar lateralmente perpendicular à diagonal caçapa
        // Para cantos: diagonal vai em x e y. Perpendicular: (+x, -y) ou (-x, +y)
        dourada.x += offsetBase * lado;
        dourada.y -= offsetBase * lado * 0.5;
        
        // Clamp dentro do canvas
        dourada.x = Math.max(dourada.r + 10, Math.min(canvas.width - dourada.r - 10, dourada.x));
        dourada.y = Math.max(dourada.r + 10, Math.min(canvas.height - dourada.r - 10, dourada.y));
        
        // Branca longe da caçapa
        branca.x = dourada.x + (hole.x < centroX ? 80 : -80);
        branca.y = dourada.y + (hole.y < centroY ? 80 : -80);
    } else {
        // GANHOU: posição alinhada (fácil)
        dourada.x = (hole.x < centroX) ? centroX + 40 : centroX - 40;
        dourada.y = (hole.y < centroY) ? centroY + 40 : centroY - 40;

        branca.x = dourada.x + (hole.x < centroX ? 70 : -70);
        branca.y = dourada.y + (hole.y < centroY ? 70 : -70);
    }
    
    // Garantir ambas dentro dos limites
    branca.x = Math.max(branca.r + 5, Math.min(canvas.width - branca.r - 5, branca.x));
    branca.y = Math.max(branca.r + 5, Math.min(canvas.height - branca.r - 5, branca.y));

    velocidadeBranca = { x: 0, y: 0 };
    velocidadeDourada = { x: 0, y: 0 };
    bolaMovida = false;
    jogoAtivo = false;
    tempoJogo = 0;
    timerAtivo = false;
    isTouching = false;
    
    desenhar();
}

/* ===== DESENHAR JOGO =====*/
function desenhar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Textura de feltro (pré-renderizada, desempenho otimizado)
    ctx.drawImage(feltOffscreen, 0, 0);

    // Vinheta nas bordas (gradiente pré-calculado)
    ctx.fillStyle = vignetteGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Marca central decorativa
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = "#E8D5A3";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#E8D5A3";
    ctx.fill();
    ctx.restore();

    // Desenhar CAÇAPA premium
    const holeGrad = ctx.createRadialGradient(hole.x, hole.y, 0, hole.x, hole.y, hole.r);
    holeGrad.addColorStop(0, "#000000");
    holeGrad.addColorStop(0.7, "#0a0a0a");
    holeGrad.addColorStop(1, "#1a1a1a");
    ctx.fillStyle = holeGrad;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI * 2);
    ctx.fill();

    // Anel metálico externo
    ctx.strokeStyle = "#B8860B";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI * 2);
    ctx.stroke();

    // Anel dourado interno
    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.r - 3, 0, Math.PI * 2);
    ctx.stroke();

    // Highlight parcial no anel
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = "#FFF8DC";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.r - 1.5, Math.PI * 1.1, Math.PI * 1.6);
    ctx.stroke();
    ctx.restore();

    // Bola BRANCA realista
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;
    const wGrad = ctx.createRadialGradient(
        branca.x - branca.r * 0.3, branca.y - branca.r * 0.3, branca.r * 0.05,
        branca.x, branca.y, branca.r
    );
    wGrad.addColorStop(0, "#FFFFFF");
    wGrad.addColorStop(0.35, "#F5F5F5");
    wGrad.addColorStop(0.7, "#D0D0D0");
    wGrad.addColorStop(1, "#A0A0A0");
    ctx.fillStyle = wGrad;
    ctx.beginPath();
    ctx.arc(branca.x, branca.y, branca.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Brilho especular bola branca
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.beginPath();
    ctx.arc(branca.x - branca.r * 0.32, branca.y - branca.r * 0.32, branca.r * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Bola DOURADA realista
    // Glow sutil ao redor
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = "#FFD700";
    ctx.beginPath();
    ctx.arc(dourada.x, dourada.y, dourada.r + 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.shadowColor = "rgba(218,165,32,0.5)";
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;
    const gGrad = ctx.createRadialGradient(
        dourada.x - dourada.r * 0.3, dourada.y - dourada.r * 0.3, dourada.r * 0.05,
        dourada.x, dourada.y, dourada.r
    );
    gGrad.addColorStop(0, "#FFF8DC");
    gGrad.addColorStop(0.35, "#FFD700");
    gGrad.addColorStop(0.7, "#DAA520");
    gGrad.addColorStop(1, "#B8860B");
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.arc(dourada.x, dourada.y, dourada.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Brilho especular bola dourada
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.beginPath();
    ctx.arc(dourada.x - dourada.r * 0.32, dourada.y - dourada.r * 0.32, dourada.r * 0.25, 0, Math.PI * 2);
    ctx.fill();
}

/* ===== PHYSICS DO JOGO =====*/
function atualizarFisica() {
    if (!jogoAtivo) return;

    if (timerAtivo) {
        tempoJogo += 1/60;
        const tempoRestante = Math.max(0, tempoMaximo - tempoJogo);
        document.getElementById("tempo").innerText = tempoRestante.toFixed(2);
        
        if (tempoJogo >= tempoMaximo) {
            timerAtivo = false;
            jogoAtivo = false;
            finalizarJogo(false);
            return;
        }
    }

    // Aplicar atrito
    velocidadeBranca.x *= atrito;
    velocidadeBranca.y *= atrito;
    velocidadeDourada.x *= atrito;
    velocidadeDourada.y *= atrito;

    // Mover bola branca
    branca.x += velocidadeBranca.x;
    branca.y += velocidadeBranca.y;

    // Mover bola dourada
    dourada.x += velocidadeDourada.x;
    dourada.y += velocidadeDourada.y;

    // Colisão com paredes - BRANCA
    if (branca.x - branca.r < 0) { 
        branca.x = branca.r; 
        velocidadeBranca.x *= -0.7; 
        playWallSound();
    }
    if (branca.x + branca.r > canvas.width) { 
        branca.x = canvas.width - branca.r; 
        velocidadeBranca.x *= -0.7; 
        playWallSound();
    }
    if (branca.y - branca.r < 0) { 
        branca.y = branca.r; 
        velocidadeBranca.y *= -0.7; 
        playWallSound();
    }
    if (branca.y + branca.r > canvas.height) { 
        branca.y = canvas.height - branca.r; 
        velocidadeBranca.y *= -0.7; 
        playWallSound();
    }

    // Colisão com paredes - DOURADA
    if (dourada.x - dourada.r < 0) { 
        dourada.x = dourada.r; 
        velocidadeDourada.x *= -0.7; 
        playWallSound();
    }
    if (dourada.x + dourada.r > canvas.width) { 
        dourada.x = canvas.width - dourada.r; 
        velocidadeDourada.x *= -0.7; 
        playWallSound();
    }
    if (dourada.y - dourada.r < 0) { 
        dourada.y = dourada.r; 
        velocidadeDourada.y *= -0.7; 
        playWallSound();
    }
    if (dourada.y + dourada.r > canvas.height) { 
        dourada.y = canvas.height - dourada.r; 
        velocidadeDourada.y *= -0.7; 
        playWallSound();
    }

    // Colisão entre as bolas
    const dx = dourada.x - branca.x;
    const dy = dourada.y - branca.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = branca.r + dourada.r + 2;
    
    if (dist < minDist && dist > 0) {
        const overlap = minDist - dist;
        const ux = dx / dist;
        const uy = dy / dist;
        
        branca.x -= (ux * overlap * 0.8);
        branca.y -= (uy * overlap * 0.8);
        dourada.x += (ux * overlap * 0.8);
        dourada.y += (uy * overlap * 0.8);
        
        const vx1 = velocidadeBranca.x;
        const vy1 = velocidadeBranca.y;
        const vx2 = velocidadeDourada.x;
        const vy2 = velocidadeDourada.y;
        
        const v_rel_x = vx1 - vx2;
        const v_rel_y = vy1 - vy2;
        
        const v_dot = v_rel_x * ux + v_rel_y * uy;
        
        if (v_dot > 0) {
            velocidadeBranca.x -= (v_dot * ux) * 0.9;
            velocidadeBranca.y -= (v_dot * uy) * 0.9;
            velocidadeDourada.x += (v_dot * ux) * 0.9;
            velocidadeDourada.y += (v_dot * uy) * 0.9;
            playHitSound(v_dot);

            // FÍSICA GUIADA: desvio sutil na colisão quando servidor disse "perdeu"
            if (window.resultadoFinal === false) {
                // Vetor perpendicular ao eixo de colisão
                const perpX = -uy;
                const perpY = ux;

                // Vetor da dourada até a caçapa
                const toCacapaX = hole.x - dourada.x;
                const toCacapaY = hole.y - dourada.y;

                // Dot product para saber se perpendicular aponta pra caçapa ou pra longe
                const dotPerp = perpX * toCacapaX + perpY * toCacapaY;

                // Se dotPerp > 0, a perpendicular aponta pra caçapa, então inverter
                const direcao = dotPerp > 0 ? -1 : 1;

                // Aplicar desvio sutil — força pequena na perpendicular
                const velocidadeAtual = Math.sqrt(
                    velocidadeDourada.x * velocidadeDourada.x +
                    velocidadeDourada.y * velocidadeDourada.y
                );
                const intensidadeDesvio = velocidadeAtual * 0.06;

                velocidadeDourada.x += perpX * direcao * intensidadeDesvio;
                velocidadeDourada.y += perpY * direcao * intensidadeDesvio;
            }
        }
    }

    // Verificar se bola dourada está perto da caçapa
    const dxHole = hole.x - dourada.x;
    const dyHole = hole.y - dourada.y;
    const distHole = Math.sqrt(dxHole * dxHole + dyHole * dyHole);

    // Bola dourada entra na caçapa; resultado do servidor determina vitória ou derrota
    if (distHole < hole.r) {
        // Se servidor disse ganhou, vitória! Se não, é fallback (não deveria acontecer)
        playPocketSound();
        finalizarJogo(window.resultadoFinal ? true : false);
        return;
    }

    // Parar jogo apenas se bola foi movida E velocidade muito baixa
    const velocidade = Math.sqrt(velocidadeBranca.x ** 2 + velocidadeBranca.y ** 2);
    
    if (bolaMovida && velocidade < 0.2) {
        velocidadeBranca.x = 0;
        velocidadeBranca.y = 0;
        velocidadeDourada.x = 0;
        velocidadeDourada.y = 0;
        jogoAtivo = false;
        timerAtivo = false;
        
        setTimeout(() => {
            if (apostando && !jogoAtivo) {
                finalizarJogo(false);
            }
        }, 1000);
        return;
    }

    desenhar();
}

/* ===== ESTILINGUE (SLINGSHOT) - TOUCH START =====*/
canvas.addEventListener("touchstart", (e) => {
    if (!jogoAtivo || bolaMovida) return;
    
    e.preventDefault();
    initAudio();
    playAimSound();
    
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    
    touchStartX = touch.clientX - rect.left;
    touchStartY = touch.clientY - rect.top;
    isTouching = true;
    timerAtivo = true;
    
    slingshot.style.display = "block";
});

/* ===== ESTILINGUE (SLINGSHOT) - TOUCH MOVE =====*/
canvas.addEventListener("touchmove", (e) => {
    if (!jogoAtivo || !isTouching || bolaMovida) return;
    
    e.preventDefault();
    
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const currentX = touch.clientX - rect.left;
    const currentY = touch.clientY - rect.top;
    
    // Calcular distância e ângulo entre toque inicial e atual
    const dx = currentX - touchStartX;
    const dy = currentY - touchStartY;
    
    // Vetor invertido (estilingue puxa para trás)
    const invertedX = -dx;
    const invertedY = -dy;
    
    // Calcular comprimento da linha até a bola dourada
    const distToBall = Math.sqrt(
        Math.pow(dourada.x - branca.x, 2) + 
        Math.pow(dourada.y - branca.y, 2)
    );
    
    // Normalizar e estender até passar um pouco da bola dourada
    const dist = Math.sqrt(invertedX * invertedX + invertedY * invertedY);
    if (dist > 10) {
        const normalized = 1 / dist;
        const lineLength = distToBall + 15; // Passa 15px além da bola dourada
        const endX = branca.x + (invertedX * normalized * lineLength);
        const endY = branca.y + (invertedY * normalized * lineLength);
        const border = CANVAS_BORDER_WIDTH;
        aimLine.setAttribute("x1", branca.x + border);
        aimLine.setAttribute("y1", branca.y + border);
        aimLine.setAttribute("x2", endX + border);
        aimLine.setAttribute("y2", endY + border);
    }
});

/* ===== ESTILINGUE (SLINGSHOT) - TOUCH END =====*/
canvas.addEventListener("touchend", (e) => {
    if (!jogoAtivo || !isTouching || bolaMovida) {
        slingshot.style.display = "none";
        isTouching = false;
        return;
    }
    
    e.preventDefault();
    
    // Calcular força final
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const endX = touch.clientX - rect.left;
    const endY = touch.clientY - rect.top;
    
    // Deslocamento do toque
    const dx = endX - touchStartX;
    const dy = endY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Aplicar força na direção OPOSTA
    if (dist > 5) {
        const forceStrength = Math.min(dist / 10, 70);
        const angle = Math.atan2(-dy, -dx);
        
        velocidadeBranca.x = Math.cos(angle) * forceStrength;
        velocidadeBranca.y = Math.sin(angle) * forceStrength;
        
        bolaMovida = true;
        timerAtivo = true;
    }
    
    slingshot.style.display = "none";
    isTouching = false;
});

/* ===== MOUSE - PARA DESKTOP =====*/
let mousePressed = false;

canvas.addEventListener("mousedown", (e) => {
    if (!jogoAtivo || bolaMovida) return;
    
    initAudio();
    playAimSound();
    const rect = canvas.getBoundingClientRect();
    touchStartX = e.clientX - rect.left;
    touchStartY = e.clientY - rect.top;
    isTouching = true;
    mousePressed = true;
    timerAtivo = true;
    
    slingshot.style.display = "block";
});

document.addEventListener("mousemove", (e) => {
    if (!jogoAtivo || !mousePressed || bolaMovida) return;
    
    const rect = canvas.getBoundingClientRect();
    const currentX = e.clientX - rect.left;
    const currentY = e.clientY - rect.top;
    
    const dx = currentX - touchStartX;
    const dy = currentY - touchStartY;
    
    const invertedX = -dx;
    const invertedY = -dy;
    
    const distToBall = Math.sqrt(
        Math.pow(dourada.x - branca.x, 2) + 
        Math.pow(dourada.y - branca.y, 2)
    );
    
    const dist = Math.sqrt(invertedX * invertedX + invertedY * invertedY);
    if (dist > 10) {
        const normalized = 1 / dist;
        const lineLength = distToBall + 15;
        const endX = branca.x + (invertedX * normalized * lineLength);
        const endY = branca.y + (invertedY * normalized * lineLength);
        const border = CANVAS_BORDER_WIDTH;
        aimLine.setAttribute("x1", branca.x + border);
        aimLine.setAttribute("y1", branca.y + border);
        aimLine.setAttribute("x2", endX + border);
        aimLine.setAttribute("y2", endY + border);
    }
});

document.addEventListener("mouseup", (e) => {
    if (!jogoAtivo || !mousePressed || bolaMovida) {
        slingshot.style.display = "none";
        mousePressed = false;
        isTouching = false;
        return;
    }
    
    const rect = canvas.getBoundingClientRect();
    const endX = e.clientX - rect.left;
    const endY = e.clientY - rect.top;
    
    const dx = endX - touchStartX;
    const dy = endY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > 5) {
        const forceStrength = Math.min(dist / 10, 70);
        const angle = Math.atan2(-dy, -dx);
        
        velocidadeBranca.x = Math.cos(angle) * forceStrength;
        velocidadeBranca.y = Math.sin(angle) * forceStrength;
        
        bolaMovida = true;
        timerAtivo = true;
    }
    
    slingshot.style.display = "none";
    mousePressed = false;
    isTouching = false;
});

/* ===== ATUALIZAR SALDO =====*/
function setSaldo(valor) {
    _saldoServidor = parseFloat(valor) || 0;
    document.getElementById("saldo").innerText = `R$ ${_saldoServidor.toFixed(2)}`;
}

let _fetchingSaldo = false;

async function atualizarSaldoDoServidor(retries = 3, forceUpdate = false) {
    // NÃO refetchar durante jogo ativo — confiar no saldo da resposta da aposta
    // Permitir atualização forçada (ex: polling de depósito PIX)
    if (!forceUpdate && (apostando || jogoAtivo)) return;
    if (_fetchingSaldo) return; // já está buscando, ignorar chamada duplicada
    _fetchingSaldo = true;
    try {
        // ✅ Validar se usuário está autenticado
        const token = localStorage.getItem("token");
        if (!token) {
            console.log("❌ Usuário não autenticado");
            _fetchingSaldo = false;
            return;
        }

        const res = await fetch(`/api/saldo`, {
            headers: {"Authorization": "Bearer " + token}
        });
        const data = await res.json();
        if(data.success) {
            setSaldo(data.saldo);
        } else {
            console.log("❌ Erro ao buscar saldo:", data.error);
            if (retries > 0) {
                setTimeout(() => { _fetchingSaldo = false; atualizarSaldoDoServidor(retries - 1, forceUpdate); }, 1000);
                return;
            }
        }
    } catch (e) {
        console.log("❌ Erro de conexão ao buscar saldo:", e);
        if (retries > 0) {
            setTimeout(() => { _fetchingSaldo = false; atualizarSaldoDoServidor(retries - 1, forceUpdate); }, 1000);
            return;
        }
    }
    _fetchingSaldo = false;
}

/* ===== GAME LOOP =====*/
function gameLoop() {
    atualizarFisica();
    if (gameLoopRunning) {
        requestAnimationFrame(gameLoop);
    }
}

/* NOVO CONFIRMAR APOSTA (Substitua no HTML) */
async function confirmBet() {
    initAudio();
    const btnConfirm = document.getElementById("confirm");
    btnConfirm.disabled = true;

    if (!usuarioLogado) {
        alert("❌ Você precisa estar logado!");
        btnConfirm.disabled = false;
        return;
    }
    if (valorAposta < 1 || valorAposta > 10000 || isNaN(valorAposta)) {
        alert("❌ Valor de aposta inválido!");
        btnConfirm.disabled = false;
        return;
    }

    // Cancelar qualquer refetch pendente de jogos anteriores
    if (window._refetchTimer) {
        clearTimeout(window._refetchTimer);
        window._refetchTimer = null;
    }
    if (window._finalizarRefetchTimer) {
        clearTimeout(window._finalizarRefetchTimer);
        window._finalizarRefetchTimer = null;
    }

    try {
        const token = localStorage.getItem("token");
        const res = await fetch("/api/aposta", {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
            body: JSON.stringify({ valor: valorAposta })
        });

        const data = await res.json();
        
        if (!data.success) {
            alert("❌ " + (data.message || "Erro na aposta"));
            btnConfirm.disabled = false;
            
            // ✅ Refetch se aposta falhar (saldo insuficiente, erro do servidor, etc)
            atualizarSaldoDoServidor();
            return;
        }

        // O SERVIDOR JÁ DECIDIU AQUI SE ELE GANHOU OU PERDEU
        window.resultadoFinal = data.ganhou;
        window.premioToken = data.premioToken || null;

        // Setar estado ANTES de qualquer outra coisa
        apostando = true;
        _ultimaApostaTimestamp = Date.now();

        // Usar o saldo retornado pelo servidor diretamente
        setSaldo(data.saldo);

        sortearPosicoes();
        jogoAtivo = true;
        // apostando já é true
        
        if (!gameLoopRunning) {
            gameLoopRunning = true;
            requestAnimationFrame(gameLoop);
        }

        playBetSound();
        mostrarToastBet();
        
    } catch (e) {
        alert("❌ Erro de conexão");
        btnConfirm.disabled = false;
        
        // ✅ Refetch se erro de conexão
        atualizarSaldoDoServidor();
    }
}

/* NOVO FINALIZAR JOGO (Substitua no HTML) */
function finalizarJogo(ganhouVisivel) {
    jogoAtivo = false;
    timerAtivo = false;

    if (!ganhouVisivel) {
        // Bola não entrou na caçapa
        playLoseSound();
        mostrarResultado(false);
    } else if (ganhouVisivel && window.resultadoFinal) {
        // ✅ Bola entrou E servidor confirmou vitória — PAGAR PRÊMIO
        playWinSound();
        const ganhoTotal = valorAposta * 10;
        mostrarResultado(true, ganhoTotal.toFixed(2));

        // Chamar endpoint de prêmio para creditar o ganho
        const token = localStorage.getItem("token");
        fetch("/api/premio", {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
            body: JSON.stringify({ premioToken: window.premioToken })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                setSaldo(data.saldo);
            }
        })
        .catch(e => {
            console.log("Erro ao receber prêmio:", e);
            alert("⚠️ Erro ao creditar prêmio. Entre em contato com o suporte.");
        });
    } else if (ganhouVisivel && !window.resultadoFinal) {
        // Fallback de segurança — não deveria acontecer com física guiada
        playLoseSound();
        mostrarResultado(false);
    }

    // Cancelar qualquer refetch pendente
    if (window._refetchTimer) {
        clearTimeout(window._refetchTimer);
        window._refetchTimer = null;
    }
    if (window._finalizarRefetchTimer) {
        clearTimeout(window._finalizarRefetchTimer);
        window._finalizarRefetchTimer = null;
    }

    // Limpar estado
    apostando = false;
    gameLoopRunning = false;
    document.getElementById("confirm").disabled = false;

    // NÃO fazer refetch aqui — o saldo do servidor (setSaldo) já está correto
    // desde o confirmBet(). Refetch só acontece em: onload, depósito PIX, saque, aposta falha.

    setTimeout(sortearPosicoes, 1000);
}

function atualizarLucro() {
    document.getElementById("lucro").innerText = `R$ ${(valorAposta * 10).toFixed(2)}`;
}

function mostrarResultado(ganhou, valor) {
    const modal = document.getElementById('modal-resultado');
    const icone = document.getElementById('resultado-icone');
    const titulo = document.getElementById('resultado-titulo');
    const subtitulo = document.getElementById('resultado-subtitulo');
    const valorEl = document.getElementById('resultado-valor');
    if (ganhou) {
        icone.textContent = '🎉';
        titulo.textContent = 'VITÓRIA!';
        titulo.style.color = '#FFD700';
        subtitulo.textContent = 'Bola na caçapa!';
        valorEl.textContent = `+R$ ${valor}`;
        valorEl.style.display = 'block';
    } else {
        icone.textContent = '😢';
        titulo.textContent = 'Não foi dessa vez!';
        titulo.style.color = '#ff4444';
        subtitulo.textContent = 'Tente novamente!';
        valorEl.style.display = 'none';
    }
    modal.classList.add('show');
}

function fecharResultado() {
    document.getElementById('modal-resultado').classList.remove('show');
}

function mostrarToastBet() {
    const toast = document.getElementById('toast-bet');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

function selectBet(v, btn) {
    initAudio();
    valorAposta = v;
    document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active-bet'));
    btn.classList.add('active-bet');
    atualizarLucro();
    document.getElementById('custom-bet').value = '';
}

function updateCustom(val) {
    if (val) {
        valorAposta = parseFloat(val) || 0;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active-bet'));
        atualizarLucro();
    }
}

function abrirModal(tipo) {
    initAudio();
    const modal = document.getElementById("modalFinanceiro");
    const cont = document.getElementById("conteudo-modal");
    modal.style.display = "flex";
    if(tipo === 'deposito') {
        cont.innerHTML = `<h2>Depósito PIX</h2><input type="number" id="vD" placeholder="Valor R$"><div id="qR"></div><button onclick="gerarPix()" style="width:100%; padding:12px; background:gold; border:none; font-weight:bold; border-radius:6px;">Gerar QR Code</button>`;
    } else {
        cont.innerHTML = `<h2>Sacar Saldo</h2><input type="number" id="vS" placeholder="Valor R$"><input type="text" id="cP" placeholder="Chave PIX"><button onclick="fazerSaque()" style="width:100%; padding:12px; background:#2979ff; color:#fff; border:none; font-weight:bold; border-radius:6px;">Solicitar Saque</button>`;
    }
}

function copiarPix() {
    const input = document.getElementById("pixCopiaCola");
    const texto = input.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(texto).then(() => {
            fbq('track', 'AddPaymentInfo', {value: parseFloat(document.getElementById("vD").value), currency: 'BRL'});
            alert("✅ Código PIX copiado!");
        }).catch(() => {
            input.select();
            document.execCommand('copy');
            fbq('track', 'AddPaymentInfo', {value: parseFloat(document.getElementById("vD").value), currency: 'BRL'});
            alert("✅ Código PIX copiado!");
        });
    } else {
        input.select();
        document.execCommand('copy');
        fbq('track', 'AddPaymentInfo', {value: parseFloat(document.getElementById("vD").value), currency: 'BRL'});
        alert("✅ Código PIX copiado!");
    }
}

async function gerarPix() {
    const valorInput = document.getElementById("vD").value;
    const valor = parseFloat(valorInput);

    if(!valor || valor < 1) return alert("Valor inválido (mínimo R$ 1,00)");
    
    document.getElementById("qR").innerHTML = "<p style='color:white'>Gerando QR Code...</p>";
    
    try {
        // Chamada para a rota correta que criamos no server.js
        const token = localStorage.getItem("token");
        const res = await fetch("/api/gerar-pix", { 
            method: "POST", 
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token}, 
            body: JSON.stringify({
                valor: valor
            })
        });

        const data = await res.json();

        if(data.success) {
            fbq('track', 'InitiateCheckout', {value: valor, currency: 'BRL'});
            document.getElementById("qR").innerHTML = `
                <img src="${data.qrcode_image}" width="180" style="border-radius:8px; background:white; padding:5px;"><br>
                <p style="color:#aaa; font-size:9px; margin-top:5px;">Pix Copia e Cola:</p>
                <input type="text" id="pixCopiaCola" value="${data.pix_copy_paste}" readonly style="width:100%; font-size:10px; padding:5px; background:#222; color:white; border:1px solid #444; border-radius:4px;" onclick="this.select();">
                <button onclick="copiarPix()" style="width:100%; margin-top:8px; padding:10px; background:#00c853; color:#fff; border:none; border-radius:6px; font-weight:bold; font-size:12px; cursor:pointer;">📋 COPIAR CÓDIGO PIX</button>
                <button class="btn-finance btn-dep" style="margin-top:10px; font-size:10px" onclick="atualizarSaldoDoServidor(3, true)">Já paguei! Atualizar Saldo</button>
            `;
            
            // ✅ Polling a cada 5s por até 2 minutos após gerar o PIX
            let saldoAnterior = parseFloat(document.getElementById("saldo").innerText.replace("R$ ", "").replace(",", ".")) || 0;
            let tentativas = 0;
            const intervalo = setInterval(async () => {
                await atualizarSaldoDoServidor(3, true); // forceUpdate: ignora bloqueio de jogo ativo
                const saldoAtual = parseFloat(document.getElementById("saldo").innerText.replace("R$ ", "").replace(",", ".")) || 0;
                if (saldoAtual > saldoAnterior) {
                    fbq('track', 'Purchase', {value: valor, currency: 'BRL'});
                    clearInterval(intervalo);
                }
                tentativas++;
                if (tentativas >= 24) clearInterval(intervalo); // para após 120s
            }, 5000);

        } else {
            // Se cair aqui, pode ser o erro 403 (IP Bloqueado)
            document.getElementById("qR").innerHTML = `<p style='color:#ff4444'>❌ ${data.message || "Erro ao gerar PIX"}</p>`;
        }
    } catch(e) {
        console.error("Erro ao gerar PIX:", e);
        document.getElementById("qR").innerHTML = "<p style='color:#ff4444'>❌ Erro de conexão com o servidor.</p>";
    }
}

async function fazerSaque() {
    const valor = parseFloat(document.getElementById("vS").value);
    const chave = document.getElementById("cP").value;
    if(!valor || valor < 1 || !chave) return alert("Preencha todos os campos corretamente");
    
    try {
        const token = localStorage.getItem("token");
        const res = await fetch("/api/solicitar-saque", {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
            body: JSON.stringify({ valor: valor, pix: chave })
        });
        const data = await res.json();
        if(data.success) {
            alert("✅ Saque de R$ " + valor.toFixed(2) + " solicitado com sucesso!");
            fecharModal();
            atualizarSaldoDoServidor();
        } else {
            alert("❌ " + (data.message || "Erro ao solicitar saque. Saldo insuficiente?"));
        }
    } catch(e) {
        console.log("Erro ao solicitar saque:", e);
        alert("❌ Erro de conexão. Tente novamente.");
    }
}

function fecharModal() { 
    document.getElementById("modalFinanceiro").style.display = "none"; 
}
 // Bloquear F12, Ctrl+Shift+I/J/U e botão direito do mouse
document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12' || e.keyCode === 123) {
        e.preventDefault();
        return false;
    }
    // Ctrl+Shift+I/J/U
    if ((e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'U' || e.key === 'u')) ||
        (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
        e.preventDefault();
        return false;
    }
});
// Desabilitar menu do botão direito do mouse
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});

window.onload = () => { 
    sortearPosicoes(); 
    atualizarLucro();
    atualizarSaldoDoServidor();
};
